name: AGW Generate Coverage
'on':
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
env:
  BAZEL_CACHE_PLAIN_IMAGE: ghcr.io/magma/magma/bazel-cache-plain:latest
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - '.github/workflows/agw-coverage.yml'\n  - 'orc8r/**'\n\
          \  - 'lte/**'\n  - '.bazelrc'\n  - 'WORKSPACE.bazel'\n  - 'bazel/**'\n"
  c-cpp-codecov:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: C / C++ code coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Setup Bazel Docker Image
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        options: --pull always
        run: 'echo "Pulled the bazel docker image!"

          bazel # pull down bazel, if bazel download fails we can fail before we do
          all the lengthy work below

          '
    - name: Run C/C++ coverage with Bazel
      if: always()
      id: bazel-cc-codecoverage
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "# Collecting coverage with Bazel can be slow. We can follow this thread\
          \ to see if this can be improved: https://github.com/bazelbuild/bazel/issues/8178\n\
          bazel coverage \\\n  --profile=Bazel_test_cc_coverage_profile \\\n  //orc8r/gateway/c/...:*\
          \ //lte/gateway/c/...:*\n# copy out coverage information into magma so that\
          \ it's accessible from the CI node\ncp bazel-out/_coverage/_coverage_report.dat\
          \ .\n"
    - name: Upload code coverage
      if: always()
      id: c-cpp-codecov-upload
      uses: codecov/codecov-action@d9f34f8cd5cb3b3eb79b3e4b5dae3a16df499a70
      with:
        flags: c_cpp
    - name: Publish bazel profile
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: 'always() &&

        github.repository_owner == ''magma'' &&

        github.ref_name == ''master''

        '
      with:
        name: Bazel test C and C++ coverage profile
        path: Bazel_test_cc_coverage_profile
    - name: Build space left after run
      shell: bash
      run: 'echo "Available storage:"

        df -h

        '
  python-codecov:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Python code coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Setup Bazel Docker Image
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        options: --pull always
        run: 'echo "Pulled the bazel docker image!"

          bazel # pull down bazel, if bazel download fails we can fail before we do
          all the lengthy work below

          '
    - name: Run Python coverage with Bazel
      if: always()
      id: bazel-python-codecoverage
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "# Collecting coverage with Bazel can be slow. We can follow this thread\
          \ to see if this can be improved: https://github.com/bazelbuild/bazel/issues/8178\n\
          bazel coverage \\\n  --profile=Bazel_test_python_coverage_profile \\\n \
          \ //orc8r/gateway/python/...:* //lte/gateway/python/...:*\n# copy out coverage\
          \ information into magma so that it's accessible from the CI node\ncp bazel-out/_coverage/_coverage_report.dat\
          \ .\n"
    - name: Upload code coverage
      if: always()
      id: python-codecov-upload
      uses: codecov/codecov-action@d9f34f8cd5cb3b3eb79b3e4b5dae3a16df499a70
      with:
        flags: lte-test
    - name: Publish bazel profile
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: 'always() &&

        github.repository_owner == ''magma'' &&

        github.ref_name == ''master''

        '
      with:
        name: Bazel test python coverage profile
        path: Bazel_test_python_coverage_profile
    - name: Build space left after run
      shell: bash
      run: 'echo "Available storage:"

        df -h'
