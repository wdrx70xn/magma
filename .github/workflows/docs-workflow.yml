name: Docs Lint & Check Generated Files In Sync
'on':
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - [\".github/workflows/docs-workflow.yml\", \"\
          docs/**\"]\n"
    - name: Save PR number
      if: always()
      shell: bash
      run: 'mkdir -p ./pr

        echo -n ${{ github.event.number }} > ./pr/pr_number

        echo -n ${{ steps.changes.outputs.filesChanged == ''false'' }} > ./pr/skipped

        echo -n "false" > ./pr/is_reverted_pr

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: pr
        path: pr/
  markdown-lint:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Markdown lint check
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: Run docs precommit
      shell: bash
      run: 'cd ${MAGMA_ROOT}/docs

        make precommit

        '
  markdown-insync:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Markdown insync check
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: Run docs `make`
      shell: bash
      run: 'cd ${MAGMA_ROOT}/docs

        make

        '
    - name: Check all generated files are checked in after running `make -C $MAGMA_ROOT/docs`
      shell: bash
      run: 'git status

        git diff-index --quiet HEAD

        '
  check-for-missing-sidebar-pages:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Check for missing sidebar pages
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Check for broken symlinks
      shell: bash
      run: 'make -C ${MAGMA_ROOT}/docs sidebar_check

        '
  check-for-broken-symlinks:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Check for broken symlinks
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Check for broken symlinks
      shell: bash
      run: "BROKEN_SYMLINKS=$(find \"${MAGMA_ROOT}\" -xtype l)\nif [ -n \"$BROKEN_SYMLINKS\"\
        \ ]; then\n  echo \"Found broken symlinks: $BROKEN_SYMLINKS\"\n  exit 1\n\
        fi\n"
  check-markdown-links:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: Check for broken URLs in markdown files
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: gaurav-nelson/github-action-markdown-link-check@d53a906aa6b22b8979d33bc86170567e619495ec
      with:
        use-verbose-mode: 'yes'
        config-file: .github/workflows/config/markdown_link_check_config.json
        folder-path: ./docs
