name: Magma Promote Debian Packages
'on':
  workflow_dispatch:
    inputs:
      distribution:
        description: Distribution to set?
        type: string
        default: focal-ci
        required: true
jobs:
  debian-packages-promote:
    runs-on: ubuntu-latest
    env:
      distribution: ${{ inputs.distribution }}
      source-repository: magma-packages-test
      target-repository: magma-packages-prod
    steps:
    - uses: tspascoal/get-user-teams-membership@39b5264024b7c3bd7480de2f2c8d3076eed49ec5
      name: Check if user has rights to promote
      id: checkUserMember
      with:
        username: ${{ github.actor }}
        team: approvers-ci
        GITHUB_TOKEN: ${{ secrets.github_token }}
    - if: ${{ steps.checkUserMember.outputs.isTeamMember == 'false' }}
      run: 'echo "User is not a member of the approvers-ci group."

        exit 1

        '
    - name: Verify distribution
      run: "if [ ${{ env.distribution }} != 'focal-ci' ] && [[ ! ${{ env.distribution\
        \ }} =~ ^focal-1\\.[0-9]+\\.[0-9]+$ ]]\nthen\n    echo \"You have chosen 'distribution'\
        \ ${{ env.distribution }} as input.\"\n    echo \"ERROR: Distribution name\
        \ format check fails. Only focal-1.x.y is allowed. Abort!\"\n    exit 1\n\
        fi\n"
    - name: Setup JFrog CLI
      id: jfrog-setup
      if: ${{ env.JF_USER != '' && env.JF_PASSWORD != '' }}
      uses: jfrog/setup-jfrog-cli@d0a59b1cdaeeb16e65b5039fc92b8507337f1559
      env:
        JF_URL: https://linuxfoundation.jfrog.io/
        JF_USER: ${{ secrets.LF_JFROG_USERNAME }}
        JF_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
    - name: Move all debian packages to prod
      if: steps.jfrog-setup.conclusion == 'success'
      run: jf rt cp "${{ env.source-repository }}/pool/${{ env.distribution }}/(*.deb)"
        ${{ env.target-repository }}/${{ env.distribution }}/{1}
