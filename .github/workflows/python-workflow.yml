name: AGW Build & Format Python
'on':
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
      files_changed: ${{ steps.changes.outputs.filesChanged_files }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - added|modified: [\"**/*.py\"]\n"
        list-files: shell
    - name: Save PR number
      if: always()
      run: 'mkdir -p ./pr

        echo -n ${{ github.event.number }} > ./pr/pr_number

        echo -n ${{ steps.changes.outputs.filesChanged == ''false'' }} > ./pr/skipped

        echo -n "false" > ./pr/is_reverted_pr

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: pr
        path: pr/
  run-formatters-and-check-for-errors:
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_not_skip == 'true' }}
    name: Python Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        fetch-depth: 0
    - name: Build the python-precommit Docker base image
      uses: docker/build-push-action@c56af957549030174b10d6867f20e78cfd7debc5
      with:
        context: .
        file: ./lte/gateway/docker/python-precommit/Dockerfile
        push: false
        tags: magma/py-lint:latest
    - name: Format and check for leftover changes
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: magma/py-lint:latest
        options: -u 0 -v ${{ github.workspace }}:/code
        run: "echo \"Running formatting tools. This should be equivalent to running\
          \ './lte/gateway/python/precommit.py --format --diff' locally.\"\nfor file\
          \ in ${{ needs.pre_job.outputs.files_changed }};\ndo\n  set -e\n  echo \"\
          \"\n  echo \"Running isort on $file...\";\n  isort --diff --check-only $file;\n\
          \  echo \"Running autopep8 on $file...\";\n  autopep8 --diff --exit-code\
          \ --select W191,W291,W292,W293,W391,E131,E1,E2,E3 -r $file;\n  echo \"Running\
          \ add-trailing-comma on $file...\";\n  add-trailing-comma --py35-plus $file;\n\
          done;\n"
    - name: Save PR number
      if: always()
      run: 'mkdir -p ./pr

        echo ${{ github.event.number }} > ./pr/pr_number

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: pr
        path: pr/
