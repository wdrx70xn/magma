name: AGW Build, Format & Test Bazel
'on':
  workflow_dispatch:
    inputs:
      publish_bazel_profile:
        description: 'Publish bazel profile data (default: false)'
        required: false
        default: false
        type: boolean
  workflow_call:
    outputs:
      artifacts:
        value: ${{ jobs.bazel_package.outputs.artifacts }}
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
env:
  BAZEL_BASE_IMAGE: ghcr.io/magma/magma/bazel-base:latest
  BAZEL_CACHE_PLAIN_IMAGE: ghcr.io/magma/magma/bazel-cache-plain:latest
  BAZEL_CACHE_PROD_IMAGE: ghcr.io/magma/magma/bazel-cache-prod:latest
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      files_changed: ${{ steps.changes.outputs.files_changed }}
    if: github.repository_owner == 'wdrx70xn' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      if: github.event_name == 'pull_request'
      id: changes
      with:
        filters: "files_changed:\n  - '.github/workflows/bazel.yml'\n  - 'orc8r/gateway/**'\n\
          \  - 'orc8r/lib/go/**'\n  - 'orc8r/protos/**'\n  - 'feg/cloud/go/**'\n \
          \ - 'feg/gateway/**'\n  - 'lte/gateway/**'\n  - 'lte/cloud/go/**'\n  - 'lte/protos/**'\n\
          \  - '**/BUILD'\n  - '**/*.BUILD'\n  - '**/*.bazel'\n  - '**/*.bzl'\n  -\
          \ '.bazelrc'\n"
  bazel_diff:
    needs: path_filter
    name: Bazel-Diff Job
    runs-on: ubuntu-latest
    outputs:
      bazel_diff_ran: ${{ steps.bazel_diff_outputs.outputs.bazel_diff_ran }}
      run_package_job: ${{ steps.bazel_diff_outputs.outputs.run_package_job }}
      all_unit_test_targets: ${{ steps.bazel_diff_outputs.outputs.all_unit_test_targets
        }}
      cc_unit_test_targets: ${{ steps.bazel_diff_outputs.outputs.cc_unit_test_targets
        }}
      py_service_targets: ${{ steps.bazel_diff_outputs.outputs.py_service_targets
        }}
    steps:
    - name: Check Out Repo
      if: needs.path_filter.outputs.files_changed == 'true'
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        fetch-depth: 100
    - name: Setup Bazel Base Image
      if: needs.path_filter.outputs.files_changed == 'true'
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_BASE_IMAGE }}
        options: --pull always
        run: 'echo "Pulled the bazel base image!"

          '
    - name: Run bazel-diff
      if: needs.path_filter.outputs.files_changed == 'true'
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_BASE_IMAGE }}
        shell: bash
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "cd /workspaces/magma\nset -euo pipefail\n\n# Required for bazel-diff\
          \ to perform git checkout.\ngit config --global --add safe.directory /workspaces/magma\n\
          git config --global --add safe.directory /workspaces/magma/.git\n\nprintf\
          \ '\\r%s\\r' '###############################' 1>&2\nprintf '\\r%s\\r' 'Bazel-diff.'\
          \ 1>&2\nprintf '\\r%s\\r' '###############################' 1>&2\n# Check\
          \ if the workflow is run on a PR and whether the .bazelrc and WORKSPACE\
          \ files have been affected.\nIMPACTED_TARGETS_FILE=\"/tmp/impacted_targets.txt\"\
          \nif [[ (\"${{ github.event_name }}\" == \"pull_request\") && \\\n     \
          \ ! $(git diff-tree --no-commit-id --name-only -r \"${{ github.event.pull_request.base.sha\
          \ }}\" \"${{ github.SHA }}\" | \\\n        grep -E '(.bazelrc|WORKSPACE.bazel)')\
          \ \\\n    ]];\nthen\n  printf '\\r%s\\r' 'Running bazel-diff...' 1>&2\n\
          \  bazel/scripts/bazel_diff.sh \"${{ github.event.pull_request.base.sha\
          \ }}\"  \"${{ github.SHA }}\" | tee \"$IMPACTED_TARGETS_FILE\"\n  printf\
          \ \"bazel_diff_ran=true\" > /workspaces/magma/bazel_diff_ran.txt\nelse\n\
          \  printf '\\r%s\\r' 'WORKSPACE or .bazelrc files have been modified or\
          \ trigger is not a pull-request.' 1>&2\n  printf '\\r%s\\r' 'Skipping bazel-diff\
          \ ...' 1>&2\n  printf \"bazel_diff_ran=false\" > /workspaces/magma/bazel_diff_ran.txt\n\
          \  exit 0\nfi\n\n# Check if impacted_targets.txt is empty, if yes skip all\
          \ jobs.\nif [[ ! -s \"$IMPACTED_TARGETS_FILE\" ]];\nthen\n  printf '\\r%s\\\
          r' 'No relevant bazel targets are impacted, skipping all jobs.' 1>&2\n \
          \ printf \"run_package_job=false\" > /workspaces/magma/run_package_job.txt\n\
          \  printf \"\" > /workspaces/magma/all_unit_test_targets.txt\n  printf \"\
          \" > /workspaces/magma/cc_unit_test_targets.txt\n  printf \"\" > /workspaces/magma/py_service_targets.txt\n\
          \  exit 0\nfi\n\n# Determine if the release is contained in the impacted\
          \ targets list.\nif ! grep --quiet '//lte/gateway/release:release_build'\
          \ \"$IMPACTED_TARGETS_FILE\";\nthen\n  printf '\\r%s\\r' 'Skipping release\
          \ build, the packages are not affected by the changes.' 1>&2\n  printf \"\
          run_package_job=false\" > /workspaces/magma/run_package_job.txt\nelse\n\
          \  printf '\\r%s\\r' 'The packages are affected by the changes, the release\
          \ needs to be build.' 1>&2\n  printf \"run_package_job=true\" > /workspaces/magma/run_package_job.txt\n\
          fi\n\n# Determine all impacted test targets of rule type '.*_test' that\
          \ are not tagged as manual.\nbazel/scripts/filter_test_targets.sh \".*_test\"\
          \ < \"$IMPACTED_TARGETS_FILE\" | tee \"/workspaces/magma/all_unit_test_targets.txt\"\
          \n\n# Determine all impacted cc_test targets that are not tagged as manual.\n\
          bazel/scripts/filter_test_targets.sh \"cc_test\" < \"$IMPACTED_TARGETS_FILE\"\
          \ | tee \"/workspaces/magma/cc_unit_test_targets.txt\"\n\n# Determine all\
          \ impacted py_binary targets that are tagged as service.\nbazel/scripts/filter_test_targets.sh\
          \ \"py_binary\" \"service\" < \"$IMPACTED_TARGETS_FILE\" | tee \"/workspaces/magma/py_service_targets.txt\"\
          \n"
    - name: Set job output values
      if: needs.path_filter.outputs.files_changed == 'true'
      shell: bash
      id: bazel_diff_outputs
      run: "BAZEL_DIFF_RAN=\"$(cat bazel_diff_ran.txt)\"\necho \"BAZEL_DIFF_RAN: $BAZEL_DIFF_RAN\"\
        \necho \"$BAZEL_DIFF_RAN\" >> $GITHUB_OUTPUT\n\nif [[ \"$BAZEL_DIFF_RAN\"\
        \ == \"bazel_diff_ran=true\" ]];\nthen\n  RUN_PACKAGE_JOB=\"$(cat run_package_job.txt)\"\
        \n  echo \"RUN_PACKAGE_JOB: $RUN_PACKAGE_JOB\"\n  echo \"$RUN_PACKAGE_JOB\"\
        \ >> $GITHUB_OUTPUT\n\n  ALL_UNIT_TEST_TARGETS=\"all_unit_test_targets=$(cat\
        \ all_unit_test_targets.txt | tr '\\n' ' ')\"\n  echo \"ALL_UNIT_TEST_TARGETS:\
        \ $ALL_UNIT_TEST_TARGETS\"\n  echo \"$ALL_UNIT_TEST_TARGETS\" >> $GITHUB_OUTPUT\n\
        \n  CC_UNIT_TEST_TARGETS=\"cc_unit_test_targets=$(cat cc_unit_test_targets.txt\
        \ | tr '\\n' ' ')\"\n  echo \"CC_UNIT_TEST_TARGETS: $CC_UNIT_TEST_TARGETS\"\
        \n  echo \"$CC_UNIT_TEST_TARGETS\" >> $GITHUB_OUTPUT\n\n  PY_SERVICE_TARGETS=\"\
        py_service_targets=$(cat py_service_targets.txt | tr '\\n' ' ')\"\n  echo\
        \ \"PY_SERVICE_TARGETS: $PY_SERVICE_TARGETS\"\n  echo \"$PY_SERVICE_TARGETS\"\
        \ >> $GITHUB_OUTPUT\nfi\n"
  bazel_build_and_test:
    needs: bazel_diff
    if: '(github.event_name == ''push'' && github.repository_owner == ''wdrx70xn'')
      ||

      github.event_name == ''workflow_dispatch'' ||

      needs.bazel_diff.outputs.bazel_diff_ran == ''false'' ||

      (needs.bazel_diff.outputs.bazel_diff_ran == ''true'' && needs.bazel_diff.outputs.all_unit_test_targets
      != '''')

      '
    strategy:
      fail-fast: false
      matrix:
        include:
        - bazel-config: ''
          bazel-target-rule: .*_test
          docker-image-cache: ghcr.io/magma/magma/bazel-cache-plain:latest
        - bazel-config: --config=asan
          bazel-target-rule: cc_test
          docker-image-cache: ghcr.io/magma/magma/bazel-cache-asan:latest
        - bazel-config: --config=production
          bazel-target-rule: cc_test
          docker-image-cache: ghcr.io/magma/magma/bazel-cache-prod:latest
    name: Bazel Test Job
    runs-on: ubuntu-latest
    steps:
    - name: Print variables
      run: 'echo "github.event_name: ${{ github.event_name }}"

        echo "github.repository_owner: ${{ github.repository_owner }}"

        echo "github.ref_name: ${{ github.ref_name }}"

        echo "inputs.publish_bazel_profile: ${{ inputs.publish_bazel_profile }}"

        echo "needs.bazel_diff.outputs.bazel_diff_ran: ${{ needs.bazel_diff.outputs.bazel_diff_ran
        }}"

        echo "needs.bazel_diff.outputs.all_unit_test_targets: ${{ needs.bazel_diff.outputs.all_unit_test_targets
        }}"

        echo "needs.bazel_diff.outputs.cc_unit_test_targets: ${{ needs.bazel_diff.outputs.cc_unit_test_targets
        }}"

        '
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Setup Bazel Docker Image
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ matrix.docker-image-cache }}
        options: --pull always
        run: 'echo "Pulled the bazel docker image!"

          '
    - name: Run bazel build and test
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ matrix.docker-image-cache }}
        shell: bash
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "cd /workspaces/magma\nset -euo pipefail\n\nprintf '\\r%s\\r' '###############################'\
          \ 1>&2\nprintf '\\r%s\\r' 'Determining bazel test targets.' 1>&2\nprintf\
          \ '\\r%s\\r' '###############################' 1>&2\nif [[ \"${{ needs.bazel_diff.outputs.bazel_diff_ran\
          \ }}\" == 'true' ]];\nthen\n  if [[ \"${{ matrix.bazel-target-rule }}\"\
          \ == '.*_test' ]];\n  then\n    TEST_TARGETS=\"${{ needs.bazel_diff.outputs.all_unit_test_targets\
          \ }}\"\n  else\n    TEST_TARGETS=\"${{ needs.bazel_diff.outputs.cc_unit_test_targets\
          \ }}\"\n    if [[ -z \"$TEST_TARGETS\" ]];\n    then\n      printf '\\r%s\\\
          r' 'No test targets of type ${{ matrix.bazel-target-rule }} are impacted\
          \ by the changes.' 1>&2\n      printf '\\r%s\\r' 'No tests will be executed.'\
          \ 1>&2\n      exit 0\n    fi\n  fi\n  printf '\\r%s\\r' \"The test targets\
          \ of rule type ${{ matrix.bazel-target-rule }} to be executed are:\" 1>&2\n\
          \  printf '\\r%s\\r' \"$TEST_TARGETS\" 1>&2\nelse\n  printf '\\r%s\\r' 'Running\
          \ all unit test targets of type ${{ matrix.bazel-target-rule }}.' 1>&2\n\
          \  TEST_TARGETS=\"$(bazel query 'kind(${{ matrix.bazel-target-rule }}, //...)\
          \ except attr(tags, manual, //...)')\"\n  printf '\\r%s\\r' \"$TEST_TARGETS\"\
          \ 1>&2\nfi\n\nprintf '\\r%s\\r' '###############################' 1>&2\n\
          printf '\\r%s\\r' 'Executing bazel test ${{ matrix.bazel-config }}.' 1>&2\n\
          printf '\\r%s\\r' '###############################' 1>&2\nTEST_FAILED=\"\
          false\"\n\nif [[ -n \"$TEST_TARGETS\" ]];\nthen\n  bazel test \\\n    $TEST_TARGETS\
          \ \\\n    ${{ matrix.bazel-config }} \\\n    --test_output=errors \\\n \
          \   --profile=Bazel_test_all_profile || TEST_FAILED=\"true\"\nelse\n  printf\
          \ '\\r%s\\r' 'No test targets of type ${{ matrix.bazel-target-rule }} are\
          \ impacted by the changes.' 1>&2\n  printf '\\r%s\\r' 'No tests will be\
          \ executed.' 1>&2\n  exit 0\nfi\n\n# Create Bazel unit-test results\n# Can't\
          \ be a separate step, because the container's '/tmp' folder is not preserved\
          \ between steps\nmkdir bazel_unit_test_results/\nUNIQUE_FILENAME_INDEX=0\n\
          TEST_REPORT_PATHS=( $(find bazel-testlogs/ -name 'test.xml') )\nfor TEST_REPORT_PATH\
          \ in \"${TEST_REPORT_PATHS[@]}\"\ndo\n  cp \"${TEST_REPORT_PATH}\" \"bazel_unit_test_results/test_result_${UNIQUE_FILENAME_INDEX}.xml\"\
          \n  UNIQUE_FILENAME_INDEX=$((UNIQUE_FILENAME_INDEX + 1))\ndone\n\nif [[\
          \ \"${TEST_FAILED}\" == \"true\" ]];\nthen\n  echo \"ERROR: 'bazel test'\
          \ failed!\"\n  exit 1\nfi\n"
    - name: Create merged test-result XML file
      if: always()
      run: 'mkdir -p lte/gateway/test_results/

        python3 lte/gateway/python/scripts/runtime_report.py -i "[^\/]+\.xml" -w "bazel_unit_test_results"
        -o "lte/gateway/test_results/merged_unit_test_reports.xml"

        '
    - name: Publish bazel test profile
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: ${{ always() && github.event.inputs.publish_bazel_profile == 'true' }}
      with:
        name: Bazel test all profile ${{ matrix.bazel-config }}
        path: Bazel_test_all_profile
    - name: Upload Bazel unit-test results ${{ matrix.bazel-config }}
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: Bazel unit-test results ${{ matrix.bazel-config }}
        path: lte/gateway/test_results/merged_unit_test_reports.xml
    - name: Publish Bazel unit-test results ${{ matrix.bazel-config }}
      if: always()
      uses: EnricoMi/publish-unit-test-result-action/composite@46ab8d49369d898e381a607119161771bc65c2a6
      with:
        check_name: Bazel unit-test results ${{ matrix.bazel-config }}
        junit_files: lte/gateway/test_results/**/*.xml
        check_run_annotations: all tests
    - name: Build space left after run
      shell: bash
      run: 'echo "Available storage:"

        df -h

        '
  if_bazel_build_and_test_success:
    name: Run when bazel successful
    needs: bazel_build_and_test
    runs-on: ubuntu-latest
    if: success()
    outputs:
      success: ${{ steps.setoutput.outputs.success }}
    steps:
    - id: setoutput
      run: echo "success=true" >> $GITHUB_OUTPUT
  report_result_bazel_build_and_test:
    name: Bazel build and test status
    runs-on: ubuntu-latest
    if: always()
    needs:
    - path_filter
    - bazel_build_and_test
    - if_bazel_build_and_test_success
    - bazel_diff
    steps:
    - run: "bazel_build_and_test_success=\"${{ needs.if_bazel_build_and_test_success.outputs.success\
        \ }}\"\nfiles_changed=\"${{ needs.path_filter.outputs.files_changed }}\"\n\
        bazel_diff_ran=\"${{ needs.bazel_diff.outputs.bazel_diff_ran }}\"\nall_unit_test_targets=\"\
        ${{ needs.bazel_diff.outputs.all_unit_test_targets }}\"\n\necho \"The status\
        \ of this job is determined by the statuses of the previous jobs in this workflow.\"\
        \necho \"For more details on this matrix workflow please look at the following\
        \ wiki page or the PR #13562:\"\necho \"https://github.com/magma/magma/wiki/How-to-set-up-a-required-matrix-workflow-on-GitHub-actions\"\
        \necho \"https://github.com/magma/magma/pull/13562\"\n\necho \"bazel_build_and_test_success:\
        \ $bazel_build_and_test_success\"\necho \"files_changed: $files_changed\"\n\
        echo \"bazel_diff_ran: $bazel_diff_ran\"\necho \"all_unit_test_targets: $all_unit_test_targets\"\
        \n\nif [[ \\\n    \"$bazel_build_and_test_success\" == \"true\" || \\\n  \
        \  \"$files_changed\" != \"true\" || \\\n    (\"$bazel_diff_ran\" == \"true\"\
        \ && -z \"$all_unit_test_targets\") \\\n    ]];\nthen\n  echo \"Bazel build\
        \ and test job passed or was skipped\"\n  exit 0\nelse\n  echo \"Bazel build\
        \ and test job failed\"\n  exit 1\nfi\n"
  buildifier:
    needs: path_filter
    if: '(github.event_name == ''push'' && github.repository_owner == ''wdrx70xn'')
      ||

      needs.path_filter.outputs.files_changed == ''true'' ||

      github.event_name == ''workflow_dispatch''

      '
    name: Bazel Starlark Format Job
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Run starlark format check
      shell: bash
      run: 'echo "To run this check locally use: ./bazel/scripts/run_buildifier.sh
        check"

        echo "To fix any errors locally use: ./bazel/scripts/run_buildifier.sh format"

        ./bazel/scripts/run_buildifier.sh check

        '
  python_import_check:
    needs:
    - path_filter
    - bazel_diff
    if: '(github.event_name == ''push'' && github.repository_owner == ''wdrx70xn'')
      ||

      github.event_name == ''workflow_dispatch'' ||

      needs.bazel_diff.outputs.bazel_diff_ran == ''false'' ||

      (needs.bazel_diff.outputs.bazel_diff_ran == ''true'' && needs.bazel_diff.outputs.py_service_targets
      != '''')

      '
    name: Bazel Python Import Check
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Setup Bazel Docker Image
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        options: --pull always
        run: 'echo "Pulled the bazel docker image!"

          '
    - name: Run Python Import Check
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PLAIN_IMAGE }}
        shell: bash
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "cd /workspaces/magma\nset -euo pipefail\n\nprintf '\\r%s\\r' '###############################'\
          \ 1>&2\nprintf '\\r%s\\r' 'Determining bazel test targets.' 1>&2\nprintf\
          \ '\\r%s\\r' '###############################' 1>&2\nif [[ \"${{ needs.bazel_diff.outputs.bazel_diff_ran\
          \ }}\" == 'true' ]];\nthen\n  TEST_TARGETS=\"${{ needs.bazel_diff.outputs.py_service_targets\
          \ }}\"\n  printf '\\r%s\\r' 'The service test targets of type py_binary\
          \ are:' 1>&2\n  printf '\\r%s\\r' \"$TEST_TARGETS\" 1>&2\nelse\n  printf\
          \ '\\r%s\\r' 'Checking all service targets of type \"py_binary\" for ModuleNotFoundError.'\
          \ 1>&2\n  TEST_TARGETS=\"ALL_PYTHON_SERVICE_TARGETS\"\nfi\n\nprintf '\\\
          r%s\\r' '###############################' 1>&2\nprintf '\\r%s\\r' 'Executing\
          \ python import bazelification check.' 1>&2\nprintf '\\r%s\\r' '###############################'\
          \ 1>&2\nif [[ -n \"${TEST_TARGETS}\" ]];\nthen\n  if [[ \"${TEST_TARGETS}\"\
          \ == \"ALL_PYTHON_SERVICE_TARGETS\" ]];\n  then\n    bazel/scripts/test_python_service_imports.sh\
          \ 1>&2;\n  else\n    # Converting string of whitespace separated targets\
          \ into an array\n    TEST_TARGETS=( $TEST_TARGETS )\n    for target in \"\
          ${TEST_TARGETS[@]}\"\n    do\n      bazel/scripts/test_python_service_imports.sh\
          \ \"$target\" 1>&2;\n    done\n  fi\nelse\n  printf '\\r%s\\r' 'No service\
          \ targets of type \"py_binary\" were impacted by the changes.' 1>&2\n  printf\
          \ '\\r%s\\r' 'No tests will be executed.' 1>&2\nfi\n"
    - name: Build space left after run
      shell: bash
      run: 'echo "Available storage:"

        df -h

        '
  bazel_package:
    needs:
    - path_filter
    - bazel_diff
    if: '(github.event_name == ''push'' && github.repository_owner == ''wdrx70xn'')
      ||

      github.event_name == ''workflow_dispatch'' ||

      needs.bazel_diff.outputs.bazel_diff_ran == ''false'' ||

      (needs.bazel_diff.outputs.bazel_diff_ran == ''true'' && needs.bazel_diff.outputs.run_package_job
      == ''true'')

      '
    name: Bazel Package Job
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_agw_deb_pkg.outputs.artifacts }}
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Setup Bazel Docker Image
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PROD_IMAGE }}
        options: --pull always
        run: 'echo "Pulled the bazel docker image!"

          '
    - name: Build .deb Packages
      uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185
      with:
        image: ${{ env.BAZEL_CACHE_PROD_IMAGE }}
        shell: bash
        options: -v ${{ github.workspace }}:/workspaces/magma/ -v ${{ github.workspace
          }}/lte/gateway/configs:/etc/magma
        run: "cd /workspaces/magma\nset -euo pipefail\n\nprintf '\\r%s\\r' '###############################'\
          \ 1>&2\nprintf '\\r%s\\r' 'Building the release package.' 1>&2\nprintf '\\\
          r%s\\r' '###############################' 1>&2\n\nbazel run //lte/gateway/release:release_build\
          \ \\\n  --config=production \\\n  --profile=Bazel_build_package_profile\n\
          \nmkdir packages\nmv /tmp/packages/*.deb packages\n\necho \"Moving the service\
          \ executables, which are needed for the\" 1>&2\necho \"Sentry release, to\
          \ a mounted folder 'sentry_services' in the repository...\" 1>&2\nmkdir\
          \ sentry_services\nmv ./bazel-bin/lte/gateway/c/connection_tracker/src/connectiond\
          \ ./sentry_services/connectiond\nmv ./bazel-bin/lte/gateway/c/li_agent/src/liagentd\
          \ ./sentry_services/liagentd\n# 'agw_of' is renamed to 'mme' to be consistent\
          \ with the previous sentry.io publishing names\nmv ./bazel-bin/lte/gateway/c/core/agw_of\
          \ ./sentry_services/mme\nmv ./bazel-bin/lte/gateway/c/sctpd/src/sctpd ./sentry_services/sctpd\n\
          mv ./bazel-bin/lte/gateway/c/session_manager/sessiond ./sentry_services/sessiond\n"
    - name: Upload services for sentry_release job
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: 'github.repository_owner == ''magma'' &&

        ( github.ref_name == ''master'' || startsWith(github.ref_name, ''v1.'') )

        '
      with:
        name: sentry_services
        path: sentry_services
    - name: Get magma version
      run: "version_pattern=\"magma_([0-9]+\\.[0-9]+\\.[0-9]+-[0-9]+-[a-z0-9]+)_amd64.deb\"\
        \nfor i in packages/*.deb; do\n    if [[ $i =~ $version_pattern ]]; then\n\
        \        magma_version=${BASH_REMATCH[1]}\n    fi\ndone\nif [[ -z \"$magma_version\"\
        \ ]]; then\n    echo \"No file found with a matching version pattern \\\"\
        ${version_pattern}\\\". Files in folder:\"\n    ls -la packages/*.deb\n  \
        \  exit 1\nelse\n    echo \"Exporting magma version \\\"${magma_version}\\\
        \"\"\n    echo \"MAGMA_VERSION=${magma_version}\" >> $GITHUB_ENV\nfi\n"
    - name: Setup JFROG CLI
      uses: jfrog/setup-jfrog-cli@d0a59b1cdaeeb16e65b5039fc92b8507337f1559
    - name: Set dry run environment variable
      if: 'github.event_name != ''push'' || github.repository_owner != ''magma'' ||

        ( github.ref_name != ''master'' && ! startsWith(github.ref_name, ''v1.'')
        )

        '
      run: 'echo "IS_DRY=--dry-run" >> $GITHUB_ENV

        '
    - name: Publish debian packages
      id: publish_agw_deb_pkg
      env:
        DEBIAN_META_INFO: deb.distribution=focal-ci;deb.component=main;deb.architecture=amd64
      run: "RESPONSE=$(jf rt upload \\\n            --recursive=false \\\n       \
        \     --detailed-summary \\\n            --url https://linuxfoundation.jfrog.io/artifactory/\
        \ \\\n            --user ${{ secrets.LF_JFROG_USERNAME }} \\\n           \
        \ --password ${{ secrets.LF_JFROG_PASSWORD }} \\\n            ${{ env.IS_DRY\
        \ }} \\\n            --target-props=\"${DEBIAN_META_INFO}\" \\\n         \
        \   \"packages/(*).deb\" magma-packages-test/pool/focal-ci/{1}.deb)\n\necho\
        \ \"Response:\"\necho $RESPONSE | jq\necho \"Output (for firebase):\"\nARTIFACTS=$(echo\
        \ $RESPONSE | jq '{\"valid\": (.status==\"success\"), \"packages\": [.files[]\
        \ | .target]}')\necho $ARTIFACTS | jq\necho \"artifacts=$(echo $ARTIFACTS)\"\
        \ >> $GITHUB_OUTPUT\n"
    - name: Trigger debian integ test workflows
      uses: peter-evans/repository-dispatch@f2696244ec00ed5c659a5cc77f7138ad0302dffb
      if: 'github.event_name == ''push'' &&

        github.repository_owner == ''magma'' &&

        ( github.ref_name == ''master'' || startsWith(github.ref_name, ''v1.'') )

        '
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: magma/magma
        event-type: magma-debian-artifact
        client-payload: '{ "magma_version": "${{ env.MAGMA_VERSION }}", "trigger_sha":
          "${{ github.sha }}", "commit_message": "$COMMIT_MESSAGE" }'
      env:
        COMMIT_MESSAGE: ${{ toJSON(github.event.head_commit.message) }}
    - name: Publish bazel profile
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: 'always() &&

        github.event.inputs.publish_bazel_profile == ''true''

        '
      with:
        name: Bazel build package profile
        path: Bazel_build_package_profile
    - name: Build space left after run
      shell: bash
      run: 'echo "Available storage:"

        df -h

        '
  sentry_release:
    needs:
    - bazel_package
    if: 'github.repository_owner == ''wdrx70xn'' &&

      ( github.ref_name == ''master'' || startsWith(github.ref_name, ''v1.'') )

      '
    name: Sentry release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        fetch-depth: 0
    - run: mkdir sentry_services
    - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: sentry_services
        path: sentry_services
    - uses: geekyeggo/delete-artifact@54ab544f12cdb7b71613a16a2b5a37a9ade990af
      with:
        name: sentry_services
    - run: ls -l ./sentry_services
    - run: curl --silent --location https://sentry.io/get-cli/ | bash
    - uses: ./.github/workflows/composite/sentry-create-and-upload-artifacts
      with:
        EXECUTABLE_NAME: connectiond
        SENTRY_ORG: lf-9c
        PATH_TO_EXEC: ./sentry_services
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/workflows/composite/sentry-create-and-upload-artifacts
      with:
        EXECUTABLE_NAME: liagentd
        SENTRY_ORG: lf-9c
        PATH_TO_EXEC: ./sentry_services
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/workflows/composite/sentry-create-and-upload-artifacts
      with:
        EXECUTABLE_NAME: mme
        SENTRY_ORG: lf-9c
        PATH_TO_EXEC: ./sentry_services
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/workflows/composite/sentry-create-and-upload-artifacts
      with:
        EXECUTABLE_NAME: sctpd
        SENTRY_ORG: lf-9c
        PATH_TO_EXEC: ./sentry_services
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/workflows/composite/sentry-create-and-upload-artifacts
      with:
        EXECUTABLE_NAME: sessiond
        SENTRY_ORG: lf-9c
        PATH_TO_EXEC: ./sentry_services
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - name: Create a release in Sentry.io with the commit hash
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: lf-9c
      run: 'COMMIT_HASH_WITH_VERSION="magma@1.9.0.$(git rev-list --count HEAD)-${GITHUB_SHA:0:8}"

        sentry-cli --log-level=info releases new -p lab-agws-python -p lab-agws-native
        -p magma-staging-native ${COMMIT_HASH_WITH_VERSION}

        sentry-cli --log-level=info releases set-commits --auto --ignore-missing ${COMMIT_HASH_WITH_VERSION}

        sentry-cli --log-level=info releases finalize ${COMMIT_HASH_WITH_VERSION}

        '
  python_file_check:
    name: Check if there are not bazelified python files
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Execute check
      shell: bash
      run: './bazel/scripts/check_py_bazel.sh

        '
  c_cpp_file_check:
    name: Check if there are non-bazelified c or c++ files
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Execute check
      shell: bash
      run: ./bazel/scripts/check_c_cpp_bazel.sh
