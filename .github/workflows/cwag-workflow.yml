name: CWAG Format & Test
'on':
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - [\".github/workflows/cwag-workflow.yml\", \"\
          orc8r/**\", \"lte/**\", \"feg/**\", \"cwf/**\"]\n"
  cwag-precommit:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: cwag pre-commit job
    runs-on: ubuntu-latest
    env:
      GO111MODULE: 'on'
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-go@c4a742cab115ed795e34d4513e2cf7d472deb55f
      with:
        go-version: 1.21.12
    - name: Run golang_before_install.sh script
      run: ./.github/workflows/scripts/golang_before_install.sh
    - name: Run go mod download with retry
      uses: nick-fields/retry@3e91a01664abd3c5cd539100d10d33b9c5b68482
      with:
        command: cd ${MAGMA_ROOT}/cwf/gateway && go mod download
        timeout_minutes: 10
    - name: Run precommit
      run: 'make -C ${MAGMA_ROOT}/cwf/gateway precommit

        make -C ${MAGMA_ROOT}/cwf/gateway/integ_tests precommit

        '
    - name: Check precommit has not generated formatting changes
      run: "echo \"Checking for changes caused by 'make -C \\${MAGMA_ROOT}/cwf/gateway\
        \ precommit' and 'make -C \\${MAGMA_ROOT}/cwf/gateway/integ_tests precommit'.\"\
        \\\n     \"Run these commands locally to see the respective changes.\"\ncd\
        \ ${MAGMA_ROOT}\ngit status\ngit diff-index --quiet HEAD\n"
