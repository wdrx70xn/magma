name: Magma Build & Publish
'on':
  workflow_dispatch: null
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
jobs:
  build_publish_helm_charts:
    if: github.repository_owner == 'wdrx70xn'
    env:
      HELM_CHART_ARTIFACTORY_URL: https://linuxfoundation.jfrog.io/artifactory/
      HELM_CHART_MUSEUM_REPO: magma-helm-test
      HELM_CHART_MUSEUM_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
      HELM_CHART_MUSEUM_TOKEN: ${{ secrets.LF_JFROG_PASSWORD }}
      MAGMA_ROOT: ${{ github.workspace }}
      EVENT_NAME: ${{ github.event_name }}
      ISSUE_NUMBER: ${{ github.event.number }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Set Helm chart version
      run: "if [ \"${GITHUB_REF}\" = \"refs/heads/master\" ] ;then\n  echo \"VERSION=${GITHUB_RUN_NUMBER}\"\
        \ >> $GITHUB_ENV\nelif [ \"${GITHUB_EVENT_NAME}\" = \"pull_request\" ]; then\n\
        \  echo \"VERSION=${ISSUE_NUMBER}\" >> $GITHUB_ENV\nfi\n"
    - name: Launch build and publish script
      run: "if [ \"${GITHUB_REF##*/}\" = \"master\" ] ;then\n  orc8r/tools/helm/package.sh\
        \ --deployment-type all --version $VERSION  --only-package\nelif [ \"${GITHUB_EVENT_NAME}\"\
        \ = \"pull_request\" ] ;then\n  mkdir -p charts\n  orc8r/tools/helm/package.sh\
        \ --deployment-type all --version $VERSION --only-package\nelse\n  orc8r/tools/helm/package.sh\
        \ --deployment-type all\nfi\n"
    - name: Upload charts as artifacts
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: github.event_name == 'pull_request'
      with:
        name: helm-charts
        path: charts
    - name: Save PR number
      run: 'mkdir -p ./pr

        echo ${{ github.event.number }} > ./pr/pr_number

        echo "false" > ./pr/skipped

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      with:
        name: jobs pr
        path: pr/
    - name: Only keep the last 20 uploaded versions
      if: github.event_name == 'push'
      run: 'pip install artifactory

        python ci-scripts/helm_repo_rotation.py

        '
  agw-build:
    uses: ./.github/workflows/bazel.yml
    secrets: inherit
  orc8r-build:
    if: github.repository_owner == 'wdrx70xn'
    name: orc8r build job
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_artifacts.outputs.artifacts }}
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Run apt-get update
      run: sudo apt-get update
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: Run build.py
      run: 'cd ${MAGMA_ROOT}/orc8r/cloud/docker

        python3 build.py --all --nocache

        '
    - name: Create release Tag
      if: github.event_name == 'push'
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-orc8r-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: './ci-scripts/tag-push-docker.sh --images ''nginx|controller'' --tag "${TAG}"
        --tag-latest true --project orc8r

        ARTIFACTS="{\"packages\":[\"$DOCKER_REGISTRY/nginx:${TAG}\", \"$DOCKER_REGISTRY/controller:${TAG}\"],\"valid\":true}"

        echo "artifacts=$(echo $ARTIFACTS)" >> $GITHUB_OUTPUT

        '
  cloud-upload:
    name: cloud upload job
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository_owner == 'wdrx70xn'
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Install SwaggerHub CLI
      run: npm install --global swaggerhub-cli
    - name: Publish SwaggerHub API
      env:
        MAGMA_ROOT: ${{ github.workspace }}
        SWAGGERHUB_API_KEY: ${{ secrets.SWAGGERHUB_API_KEY }}
      run: 'swaggerhub api:unpublish MagmaCore/Magma/1.0.0

        swaggerhub api:update MagmaCore/Magma/1.0.0 --file ${MAGMA_ROOT}/orc8r/cloud/go/services/obsidian/swagger/v1/swagger.yml
        --published=publish --visibility=public --setdefault

        '
  cwag-deploy:
    if: github.repository_owner == 'wdrx70xn'
    name: cwag deploy job
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_artifacts.outputs.artifacts }}
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - name: Check Out Repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Maximize build space
      uses: ./.github/workflows/composite/maximize-build-space
    - name: Run docker compose
      id: cwag-docker-compose
      continue-on-error: true
      env:
        DOCKER_REGISTRY: cwf_
      run: 'cd ${MAGMA_ROOT}/cwf/gateway/docker

        docker compose --compatibility --file docker-compose.yml --file docker-compose.override.yml
        build

        '
    - name: Retry docker compose on failure
      id: retry-cwag-docker-compose
      continue-on-error: true
      if: steps.cwag-docker-compose.outcome=='failure'
      env:
        DOCKER_REGISTRY: cwf_
      run: 'cd ${MAGMA_ROOT}/cwf/gateway/docker

        docker compose --compatibility --file docker-compose.yml --file docker-compose.override.yml
        build

        '
    - name: Set the job status
      if: always()
      run: "if ${{ steps.cwag-docker-compose.outcome=='success' || steps.retry-cwag-docker-compose.outcome=='success'\
        \ }}; then\n   echo \"Docker compose completed successfully\"\nelse\n   echo\
        \ \"Docker compose failed\"\n   exit 1\nfi\n"
    - name: Save PR number
      run: 'mkdir -p ./pr

        echo ${{ github.event.number }} > ./pr/pr_number

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      with:
        name: deploy pr
        path: pr/
    - name: Create release Tag
      if: github.event_name == 'push'
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-cwag-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: './ci-scripts/tag-push-docker.sh --images ''cwag_go|gateway_go|gateway_python|gateway_sessiond|gateway_pipelined''
        --tag "${TAG}" --tag-latest true --project cwf

        ARTIFACTS="{\"packages\":[\"$DOCKER_REGISTRY/cwag_go:${TAG}\", \"$DOCKER_REGISTRY/gateway_go:${TAG}\",
        \"$DOCKER_REGISTRY/gateway_python:${TAG}\", \"$DOCKER_REGISTRY/gateway_sessiond:${TAG}\",\"$DOCKER_REGISTRY/gateway_pipelined:${TAG}\"],\"valid\":true}"

        echo "artifacts=$(echo $ARTIFACTS)" >> $GITHUB_OUTPUT

        '
  cwf-operator-build:
    if: github.repository_owner == 'wdrx70xn'
    name: cwf operator build job
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Run docker compose build
      env:
        DOCKER_REGISTRY: cwf_
      run: 'cd ${MAGMA_ROOT}/cwf/k8s/cwf_operator/docker

        DOCKER_REGISTRY=cwf_ docker compose --compatibility build

        '
    - name: Save PR number
      run: 'mkdir -p ./pr

        echo ${{ github.event.number }} > ./pr/pr_number

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      with:
        name: operator pr
        path: pr/
    - name: Create release Tag
      if: github.event_name == 'push'
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-cwag-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: './ci-scripts/tag-push-docker.sh --images ''operator'' --tag "${TAG}" --tag-latest
        true --project cwf

        '
  feg-build:
    if: github.repository_owner == 'wdrx70xn'
    name: feg-build
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_artifacts.outputs.artifacts }}
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: generate test certs and snowflake
      run: '# TODO add rootCA.pem and snowflake files in the ubuntu-1604:201903-01
        image

        # create directories

        cd ${MAGMA_ROOT} && mkdir -p .cache/test_certs/ && mkdir -p .cache/feg/

        # create test certs

        cd ${MAGMA_ROOT}/.cache/test_certs/

        openssl genrsa -out rootCA.key 2048

        openssl req -x509 -new -nodes -key rootCA.key -sha256 -days 365000 -out rootCA.pem
        -subj "/C=US/CN=rootca.magma.test"

        # create snowflake

        cd ${MAGMA_ROOT}/.cache/feg/ && touch snowflake

        '
    - name: Build docker images
      env:
        DOCKER_REGISTRY: feg_
      run: 'cd ${MAGMA_ROOT}/feg/gateway/docker

        python3 build.py

        '
    - name: run docker containers and check health
      env:
        DOCKER_REGISTRY: feg_
      run: 'cd ${MAGMA_ROOT}/feg/gateway/docker

        python3 build.py -e

        '
    - name: Create release Tag
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-feg-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: './ci-scripts/tag-push-docker.sh --images ''gateway_go|gateway_python''
        --tag "${TAG}" --tag-latest true --project feg

        ARTIFACTS="{\"packages\":[\"$DOCKER_REGISTRY/gateway_go:${TAG}\", \"$DOCKER_REGISTRY/gateway_python:${TAG}\"],\"valid\":true}"

        echo "artifacts=$(echo $ARTIFACTS)" >> $GITHUB_OUTPUT

        '
  nms-build:
    if: github.repository_owner == 'wdrx70xn'
    name: nms-build job
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_artifacts.outputs.artifacts }}
    env:
      MAGMA_ROOT: ${{ github.workspace }}
      NMS_ROOT: ${{ github.workspace }}/nms
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Run docker compose
      id: nms-docker-compose
      run: 'cd ${MAGMA_ROOT}/nms

        COMPOSE_PROJECT_NAME=magmalte docker compose --compatibility build magmalte

        '
    - name: Create release Tag
      if: github.event_name == 'push'
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-orc8r-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: './ci-scripts/tag-push-docker.sh --images ''magmalte'' --tag "${TAG}" --tag-latest
        true --project magmalte

        ARTIFACTS="{\"packages\":[\"$DOCKER_REGISTRY/magmalte:${TAG}\"],\"valid\":true}"

        echo "artifacts=$(echo $ARTIFACTS)" >> $GITHUB_OUTPUT

        '
  Publish_to_firebase:
    name: Publish to firebase
    if: always() && github.event_name == 'push' && github.repository_owner == 'wdrx70xn'
    runs-on: ubuntu-latest
    needs:
    - agw-build
    - feg-build
    - orc8r-build
    - cwag-deploy
    - nms-build
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: Publish to
      env:
        FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        WORKERS: wl_lab_5g,feg_integ_test
        BUILD_ID: ${{ github.sha }}
        BUILD_METADATA: '{"github:workflow": "${{ github.workflow }}", "github:run_id":
          "${{ github.run_id }}", "github:actor": "${{ github.actor }}", "github:repository":
          "${{ github.repository }}", "github:event_name": "${{ github.event_name
          }}", "github:sha": "${{ github.sha }}", "github:sha:url": "${{github.event.repository.owner.html_url}}/magma/commit/${{github.sha}}",
          "github:ref": "${{ github.ref }}"}'
        FEG_ARTIFACTS: ${{ needs.feg-build.outputs.artifacts }}
        ORC8R_ARTIFACTS: ${{ needs.orc8r-build.outputs.artifacts }}
        CWAG_ARTIFACTS: ${{ needs.cwag-deploy.outputs.artifacts }}
        NMS_ARTIFACTS: ${{ needs.nms-build.outputs.artifacts }}
        AGW_ARTIFACTS: ${{ needs.agw-build.outputs.artifacts }}
      run: 'python -m pip install --upgrade pip

        pip3 install pyrebase4

        python ci-scripts/firebase_publish.py

        '
  domain-proxy-build:
    if: github.repository_owner == 'wdrx70xn'
    name: domain proxy build job
    runs-on: ubuntu-latest
    outputs:
      artifacts: ${{ steps.publish_artifacts.outputs.artifacts }}
    env:
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Prepare tools
      working-directory: ${{ github.workspace }}/dp
      run: 'make _install_skaffold_ci

        '
    - name: Create release Tag
      if: github.event_name == 'push'
      run: "if [ \"$GITHUB_REF\" = \"refs/heads/master\" ]; then\n  echo TAG=\"${GITHUB_SHA:0:8}\"\
        \ >> $GITHUB_ENV\nelse\n  GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}\n\
        \  echo TAG=\"${GIT_BRANCH_VERSION:1}\" >> $GITHUB_ENV\nfi\n"
    - name: Tag and push to Jfrog Registry
      id: publish_artifacts
      if: github.event_name == 'push'
      working-directory: ${{ github.workspace }}/dp
      env:
        DOCKER_REGISTRY: linuxfoundation.jfrog.io/magma-docker-orc8r-test
        DOCKER_USER: ${{ secrets.LF_JFROG_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
      run: 'docker login "${DOCKER_REGISTRY}" -u "${DOCKER_USER}" -p "${DOCKER_PASSWORD}"

        skaffold build --default-repo="${DOCKER_REGISTRY}" --tag="${TAG}" --push --profile=remote-push

        '
