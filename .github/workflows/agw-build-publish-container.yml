name: AGW Build, Publish & Test Container
'on':
  workflow_dispatch:
    inputs:
      registry:
        type: string
        description: Overwrite registry (default linuxfoundation.jfrog.io/magma-docker-agw-test).
  push:
    branches:
    - master
    - v1.*
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
env:
  registry: ${{ inputs.registry || 'linuxfoundation.jfrog.io/magma-docker-agw-test'
    }}
jobs:
  build-containers:
    outputs:
      image_tag: ${{ steps.set-agwc-tags.outputs.image_tag }}
      registry: ${{ steps.set-registry.outputs.registry }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - id: set-registry
      name: Set registry and image_prefix
      run: "echo ${{ env.registry }}\necho registry=${{ env.registry }} >> $GITHUB_OUTPUT\n\
        if [ ${{ env.registry }} = docker.io ]\nthen\n  echo image_prefix=${{ secrets.LF_JFROG_USERNAME\
        \ }}/ >> $GITHUB_OUTPUT  # dockerhub image URLs have the form docker.io/<username>/image\n\
        fi\n"
    - name: verify registry output
      run: 'echo "Registry is ${{ steps.set-registry.outputs.registry }}"

        echo "Image prefix is ${{ steps.set-registry.outputs.image_prefix }}"

        '
    - id: get-short-git-sha
      name: Set short git sha output
      run: 'echo ${GITHUB_SHA:0:8}

        echo commit_hash=${GITHUB_SHA:0:8} >> $GITHUB_ENV

        '
    - name: verify git sha output
      run: echo "Git SHA is ${commit_hash}"
    - name: Create possible release Tag
      if: github.event_name == 'push' && github.ref_name != 'master'
      run: 'GIT_BRANCH_VERSION=${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}

        echo commit_hash="${GIT_BRANCH_VERSION:1}" >> $GITHUB_ENV

        '
    - name: Set agwc tags
      id: set-agwc-tags
      run: "c_image=${{ steps.set-registry.outputs.registry }}/${{ steps.set-registry.outputs.image_prefix\
        \ }}agw_gateway_c\npython_image=${{ steps.set-registry.outputs.registry }}/${{\
        \ steps.set-registry.outputs.image_prefix }}agw_gateway_python\novs_image=${{\
        \ steps.set-registry.outputs.registry }}/${{ steps.set-registry.outputs.image_prefix\
        \ }}agw_gateway_ovs\ngo_image=${{ steps.set-registry.outputs.registry }}/${{\
        \ steps.set-registry.outputs.image_prefix }}gateway_go\n\necho image_tag=${commit_hash}\
        \ >> $GITHUB_OUTPUT\nif [[ ${{ github.ref_name }} = master ]]\nthen\n  echo\
        \ c_image_tags=${c_image}:${commit_hash},${c_image}:latest >> $GITHUB_OUTPUT\n\
        \  echo python_image_tags=${python_image}:${commit_hash},${python_image}:latest\
        \ >> $GITHUB_OUTPUT\n  echo ovs_image_tags=${ovs_image}:${commit_hash},${ovs_image}:latest\
        \ >> $GITHUB_OUTPUT\n  echo go_image_tags=${go_image}:${commit_hash},${go_image}:latest\
        \ >> $GITHUB_OUTPUT\nelse\n  echo c_image_tags=${c_image}:${commit_hash} >>\
        \ $GITHUB_OUTPUT\n  echo python_image_tags=${python_image}:${commit_hash}\
        \ >> $GITHUB_OUTPUT\n  echo ovs_image_tags=${ovs_image}:${commit_hash} >>\
        \ $GITHUB_OUTPUT\n  echo go_image_tags=${go_image}:${commit_hash} >> $GITHUB_OUTPUT\n\
        fi\n"
    - name: Print agwc tags
      run: 'echo "C image: ${{ steps.set-agwc-tags.outputs.c_image_tags }}"

        echo "Python image: ${{ steps.set-agwc-tags.outputs.python_image_tags }}"

        echo "OVS image: ${{ steps.set-agwc-tags.outputs.ovs_image_tags }}"

        echo "Go image: ${{ steps.set-agwc-tags.outputs.go_image_tags }}"

        '
    - uses: ./.github/workflows/composite/docker-builder-agw
      id: docker-builder-c
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        FILE: lte/gateway/docker/services/c/Dockerfile
        TAGS: ${{ steps.set-agwc-tags.outputs.c_image_tags }}
        TARGET: gateway_c
    - run: echo "docker-builder-c conclusion = ${{ steps.docker-builder-c.conclusion
        }}"
    - uses: ./.github/workflows/composite/docker-builder-agw
      id: docker-builder-python
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        FILE: lte/gateway/docker/services/python/Dockerfile
        TAGS: ${{ steps.set-agwc-tags.outputs.python_image_tags }}
        TARGET: gateway_python
    - run: echo "docker-builder-python conclusion = ${{ steps.docker-builder-python.conclusion
        }}"
    - uses: ./.github/workflows/composite/docker-builder-agw
      id: docker-builder-ovs
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        FILE: lte/gateway/docker/services/openvswitch/Dockerfile
        TAGS: ${{ steps.set-agwc-tags.outputs.ovs_image_tags }}
        TARGET: gateway_ovs
    - run: echo "docker-builder-ovs conclusion = ${{ steps.docker-builder-ovs.conclusion
        }}"
    - uses: ./.github/workflows/composite/docker-builder-agw
      id: docker-builder-go
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        FILE: feg/gateway/docker/go/Dockerfile
        TAGS: ${{ steps.set-agwc-tags.outputs.go_image_tags }}
        TARGET: gateway_go
    - run: echo "docker-builder-go conclusion = ${{ steps.docker-builder-go.conclusion
        }}"
  build-containers-ghz:
    runs-on: ubuntu-latest
    needs: build-containers
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - id: set-registry
      name: Set registry and image_prefix
      run: "echo ${{ env.registry }}\necho registry=${{ env.registry }} >> $GITHUB_OUTPUT\n\
        if [ ${{ env.registry }} = docker.io ]\nthen\n  echo image_prefix=${{ secrets.LF_JFROG_USERNAME\
        \ }}/ >> $GITHUB_OUTPUT  # dockerhub image URLs have the form docker.io/<username>/image\n\
        fi\n"
    - name: verify registry output
      run: 'echo "Registry is ${{ steps.set-registry.outputs.registry }}"

        echo "Image prefix is ${{ steps.set-registry.outputs.image_prefix }}"

        '
    - uses: ./.github/workflows/composite/docker-builder-agw
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        TAGS: ${{ steps.set-registry.outputs.registry }}/${{ steps.set-registry.outputs.image_prefix
          }}ghz_gateway_c:${{ needs.build-containers.outputs.image_tag }}
        TARGET: agw_c_ghz
        CONTEXT: lte/gateway/docker/ghz
    - uses: ./.github/workflows/composite/docker-builder-agw
      with:
        REGISTRY_USERNAME: ${{ secrets.LF_JFROG_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
        REGISTRY: ${{ env.registry }}
        TAGS: ${{ steps.set-registry.outputs.registry }}/${{ steps.set-registry.outputs.image_prefix
          }}ghz_gateway_python:${{ needs.build-containers.outputs.image_tag }}
        TARGET: agw_python_ghz
        CONTEXT: lte/gateway/docker/ghz
  test-containers-precommit:
    needs: build-containers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/lte-integ-test-containerized.yml
    with:
      image_tag: ${{ needs.build-containers.outputs.image_tag }}
      registry: ${{ needs.build-containers.outputs.registry }}
      test_targets: precommit
    secrets: inherit
  test-containers-extended:
    needs: build-containers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/lte-integ-test-containerized.yml
    with:
      image_tag: ${{ needs.build-containers.outputs.image_tag }}
      registry: ${{ needs.build-containers.outputs.registry }}
      test_targets: extended_tests
    secrets: inherit
  test-containers-extended-long:
    needs: build-containers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/lte-integ-test-containerized.yml
    with:
      image_tag: ${{ needs.build-containers.outputs.image_tag }}
      registry: ${{ needs.build-containers.outputs.registry }}
      test_targets: extended_tests_long
    secrets: inherit
  publish-container-test-results:
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push'
    needs:
    - test-containers-precommit
    - test-containers-extended
    - test-containers-extended-long
    steps:
    - name: Checkout repo
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Create test_results directory
      run: mkdir -p lte/gateway/test_results
    - name: Download test results of precommit tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test_results_precommit
        path: ${{ github.workspace }}/lte/gateway/test_results
    - name: Download final status of precommit tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test-status-precommit
    - name: Download test results of extended tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test_results_extended_tests
        path: ${{ github.workspace }}/lte/gateway/test_results
    - name: Download final status of of extended tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test-status-extended_tests
    - name: Download test results of long extended tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test_results_extended_tests_long
        path: ${{ github.workspace }}/lte/gateway/test_results
    - name: Download final status of of long extended tests
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
      with:
        name: test-status-extended_tests_long
    - name: Determine end result for all test targets
      id: determine_end_result
      run: "result_precommit=$(cat test_status_precommit.txt)\nresult_extended=$(cat\
        \ test_status_extended_tests.txt)\nresult_extended_long=$(cat test_status_extended_tests_long.txt)\n\
        if [ $result_precommit == $result_extended ] && [ $result_precommit == $result_extended_long\
        \ ]\nthen\n  mv test_status_precommit.txt test_status.txt\n  echo \"result=$result_precommit\"\
        \ >> $GITHUB_OUTPUT\nelse\n  echo fail > test_status.txt\n  echo \"result=fail\"\
        \ >> $GITHUB_OUTPUT\nfi\nrm test_status_*.txt\n"
    - name: Setup python
      uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: Install pre-requisites
      run: 'pip3 install --upgrade pip

        pip3 install firebase_admin

        '
    - name: Publish results to Firebase
      env:
        FIREBASE_SERVICE_CONFIG: ${{ secrets.FIREBASE_SERVICE_CONFIG }}
        REPORT_FILENAME: lte_integ_test_containerized${{ github.sha }}.html
      run: 'npm install -g xunit-viewer

        [ -d "lte/gateway/test_results/" ] && { xunit-viewer -r lte/gateway/test_results/
        -o "$REPORT_FILENAME"; }

        [ -f "$REPORT_FILENAME" ] && { python ci-scripts/firebase_upload_file.py -f
        "$REPORT_FILENAME" -o out_url.txt; }

        [ -f "out_url.txt" ] && { URL=$(cat out_url.txt); }

        python ci-scripts/firebase_publish_report.py -id ${{ github.sha }} --verdict
        ${{ job.status }} --run_id ${{ github.run_id }} containerized_lte --url $URL

        '
