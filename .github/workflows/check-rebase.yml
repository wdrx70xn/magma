name: PR Check Rebase
'on':
  pull_request:
    branches:
    - master
    - v1.*
jobs:
  checkRebase:
    runs-on: ubuntu-latest
    env:
      HEAD_FULL_NAME: ${{github.event.pull_request.head.repo.full_name}}
      BASE_FULL_NAME: ${{github.event.pull_request.base.repo.full_name}}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
    - name: Checkout Head
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        repository: ${{env.HEAD_FULL_NAME}}
        fetch-depth: 0
    - name: Checkout Base
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        repository: ${{env.BASE_FULL_NAME}}
        fetch-depth: 0
    - name: Check Commits Hash
      run: "COMMON_SHA=\"$(git merge-base $BASE_SHA $HEAD_SHA)\"\nif [ \"${COMMON_SHA}\"\
        \ = \"$BASE_SHA\" ]; then\n  echo \"Merge Succeeded : It is rebased\"\n  exit\
        \ 0\nelse\n  echo \"Merge Failed : It is not rebased\"\n  exit 1\nfi\n"
