name: Orc8r Lint & Test
'on':
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - \".github/workflows/cloud-workflow.yml\"\n  -\
          \ \"lte/protos/**\"\n  - \"cwf/cloud/**\"\n  - \"feg/cloud/**\"\n  - \"\
          lte/cloud/**\"\n  - \"orc8r/**\"\n  - \"dp/cloud/**\"\n  - \"dp/protos/**\"\
          \n"
    - name: Save should_not_skip output
      if: always()
      run: 'mkdir -p ./pr

        echo -n ${{ steps.changes.outputs.filesChanged == ''false'' }} > ./pr/skipped

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: pr
        path: pr/
  cloud-tests:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: cloud-tests
    runs-on: ubuntu-latest
    env:
      MAGMA_ROOT: ${{ github.workspace }}
      GO111MODULE: 'on'
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-python@13ae5bb136fac2878aff31522b9efb785519f984
      with:
        python-version: 3.8.10
    - name: deploy-sync-checkin
      if: always()
      id: deploy-sync-checkin
      run: 'cd ${MAGMA_ROOT}/orc8r/cloud/deploy/orc8r_deployer/docker

        ./run_deployer.bash --deploy-dir /tmp/deploy_dir --build --test check_all

        '
    - name: Lint cloud Go code
      if: always()
      id: cloud-lint-lint
      run: 'cd ${MAGMA_ROOT}/orc8r/cloud/docker

        python3 build.py --lint

        '
    - name: Generate test coverage
      if: always() && steps.cloud-lint-lint.outcome=='success'
      id: cloud-lint-cov
      run: 'cd ${MAGMA_ROOT}/orc8r/cloud/docker

        python3 build.py --coverage

        '
    - uses: codecov/codecov-action@d9f34f8cd5cb3b3eb79b3e4b5dae3a16df499a70
      if: always() && steps.cloud-lint-cov.outcome=='success'
      id: cloud-lint-codecov
      with:
        files: ${{ env.MAGMA_ROOT}}/orc8r/cloud/coverage/all.gocov
        flags: cloud_lint
    - name: Run tests cloud Go
      if: always()
      id: cloud-test
      run: 'cd ${MAGMA_ROOT}/orc8r/cloud/docker

        python3 build.py --tests --up

        ls ${MAGMA_ROOT}/orc8r/cloud/test-results

        '
      timeout-minutes: 15
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      with:
        name: Unit Test Results
        path: ${{ env.MAGMA_ROOT}}/orc8r/cloud/test-results/*
    - uses: actions/setup-go@c4a742cab115ed795e34d4513e2cf7d472deb55f
      if: always()
      id: gateway_test_init
      with:
        go-version: 1.21.12
    - name: Download dependencies
      if: always() && steps.gateway_test_init.outcome=='success'
      id: gateway_test_dep
      run: 'cd cwf/gateway

        go mod download

        '
    - name: Gateway go tests
      if: always() && steps.gateway_test_dep.outcome=='success'
      id: gateway_test
      run: 'cd ${MAGMA_ROOT}/orc8r/gateway/go

        go test ./...

        go vet ./...'
