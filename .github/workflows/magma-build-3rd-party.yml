name: Magma Build & Publish 3rd Party Dependencies
'on':
  push:
    branches:
    - master
    - v1.*
    paths:
    - third_party/**
    - .github/workflows/magma-build-3rd-party.yml
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - master
    - v1.*
    paths:
    - third_party/**
    - .github/workflows/magma-build-3rd-party.yml
  schedule:
  - cron: 36 4 * * 0
  workflow_dispatch:
    inputs:
      distribution:
        description: Distribution to set?
        default: focal-ci
        required: true
jobs:
  build_dependencies:
    runs-on: ubuntu-latest
    container: ghcr.io/magma/magma/devcontainer:sha-84cfceb
    env:
      repository: magma-packages-test
      distribution: ${{ inputs.distribution || 'focal-ci' }}
      build-directory: third_party/build
    strategy:
      fail-fast: false
      matrix:
        dependency:
        - aioeventlet
        - aioh2
        - asn1c
        - bcc
        - folly
        - freediameter
        - gnutls
        - grpc
        - libfluid
        - liblfds
        - magma-cpp-redis
        - magma-libtacopie
        - nettle
        - prometheus-cpp
        - ryu
        - sentry-native
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Build debian package
      working-directory: ${{ env.build-directory }}
      run: ./build.py --no-install ${{ matrix.dependency }}
    - name: Test installability of the debian package built
      working-directory: ${{ env.build-directory }}
      run: 'sudo apt-get update

        sudo apt-get install --yes --allow-downgrades ./*.deb

        '
    - name: Verify distribution
      run: "if [ ${{ env.distribution }} != 'focal-ci' ] && [[ ! ${{ env.distribution\
        \ }} =~ ^focal-1\\.[0-9]+\\.[0-9]+$ ]]; then\n    echo \"You have chosen 'distribution'\
        \ ${{ env.distribution }} as input.\"\n    echo \"ERROR: Distribution name\
        \ format check fails. Only focal-1.x.y is allowed. Abort!\"\n    exit 1\n\
        fi\n"
    - name: Setup JFrog CLI
      id: jfrog-setup
      if: ${{ env.JF_USER != '' && env.JF_PASSWORD != '' }}
      uses: jfrog/setup-jfrog-cli@d0a59b1cdaeeb16e65b5039fc92b8507337f1559
      env:
        JF_URL: https://linuxfoundation.jfrog.io/
        JF_USER: ${{ secrets.LF_JFROG_USERNAME }}
        JF_PASSWORD: ${{ secrets.LF_JFROG_PASSWORD }}
    - name: Publish debian package
      if: steps.jfrog-setup.conclusion == 'success' && github.event_name == 'workflow_dispatch'
      working-directory: ${{ env.build-directory }}
      run: "file=$(ls *${{ matrix.dependency }}*.deb)\nname=${file%%.deb}\narchitecture=${name##*_}\n\
        echo Architecture is ${architecture}\njf rt upload \\\n  --recursive=false\
        \ \\\n  --detailed-summary \\\n  --target-props=\"deb.component=main;deb.distribution=${{\
        \ env.distribution }};deb.architecture=${architecture}\" \\\n  \"(*${{ matrix.dependency\
        \ }}*).deb\" ${{ env.repository }}/pool/${{ env.distribution }}/{1}.deb\n"
