name: PR Lint Reviewdog
'on':
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number}}
  cancel-in-progress: true
jobs:
  files_changed:
    runs-on: ubuntu-latest
    outputs:
      changed_cpp: ${{ steps.changes.outputs.cpp }}
      changed_javascript: ${{ steps.changes.outputs.javascript }}
      changed_python: ${{ steps.changes.outputs.python }}
      changed_terraform: ${{ steps.changes.outputs.terraform }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "cpp:\n  - [\"lte/gateway/c/**\", \"orc8r/gateway/c/**\", \"lte/gateway/python/**\"\
          ]\njavascript:\n  - [\"nms/**\", \"**/*.js\"]\npython:\n  - [\"**/*.py\"\
          ]\nterraform:\n  - [\"**/*.tf\"]\n"
  cpplint:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_cpp == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: cpplint
      uses: reviewdog/action-cpplint@a5d486c641b1ae5fd018b4fe6bf7bef3bc6e506e
      with:
        github_token: ${{ secrets.github_token }}
        reporter: github-pr-review
        flags: --linelength=120
        filter: -build/include_subdir,-build/c++11,-build/include_what_you_use
        reviewdog_flags: -fail-on-error
  golangci-lint:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_go == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: golangci-lint
      uses: reviewdog/action-golangci-lint@53f8eabb87b40b1a2c63ec75b0d418bd0f4aa919
      with:
        golangci_lint_flags: --config=../../.golangci.yml
        reporter: github-pr-review
        workdir: src/go/
  hadolint:
    name: dockerfile-lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: hadolint
      uses: reviewdog/action-hadolint@55be5d2c4b0b80d439247b128a9ded3747f92a29
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        hadolint_ignore: DL3005
  eslint:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_javascript == 'true' }}
    name: eslint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: setup node
      uses: actions/setup-node@8c91899e586c5b171469028077307d293428b516
      with:
        node-version: 16
    - name: install dependencies
      run: yarn install
      working-directory: nms/
    - name: eslint
      uses: reviewdog/action-eslint@v1
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        workdir: nms/
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: markdownlint
      uses: reviewdog/action-markdownlint@v0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        filter_mode: added
        reporter: github-pr-review
        fail_on_error: false
        markdownlint_flags: --config ./docs/readmes/.markdownlint.yaml .
  misspell:
    name: misspell
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: misspell
      uses: reviewdog/action-misspell@811b1e15f531430be3a5784e3d591bd657df18b0
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        locale: US
        exclude: './nms/yarn.lock

          '
  mypy:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_python == 'true' }}
    name: mypy
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: Run mypy with reviewdog
      uses: tsuyoshicho/action-mypy@176f65a2ad781202baffaf870e5715d768d799a8
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: file
        reporter: github-pr-review
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: shellcheck
      uses: reviewdog/action-shellcheck@66c9a47bf02255b250284a82251cb4cadf5043f5
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        pattern: '*.sh'
  tflint:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_terraform == 'true' }}
    name: tflint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: Run tflint with reviewdog
      uses: reviewdog/action-tflint@86b1913cb664b079cb435014ad64835acf66c639
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        fail_on_error: true
        level: info
  wemake-python-styleguide:
    needs: files_changed
    if: ${{ needs.files_changed.outputs.changed_python == 'true' }}
    name: wemake-python-styleguide
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: Get changed Python files
      id: py-changes
      run: "echo \"py_files_list=$(git diff --name-only --diff-filter=ACMRT \\\n \
        \ ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha\
        \ }} \\\n  | grep .py$ | xargs)\" >> $GITHUB_OUTPUT\n"
    - name: wemake-python-styleguide
      uses: wemake-services/wemake-python-styleguide@657508a0b169e15faeda641c4d9c7bc2afda484b
      with:
        reporter: github-pr-review
        path: ${{ steps.py-changes.outputs.py_files_list }}
      env:
        GITHUB_TOKEN: ${{ secrets.github_token }}
    - name: Info for local execution
      if: failure()
      run: 'echo "Running linting tools failed. This should be equivalent to running
        ''./lte/gateway/python/precommit.py --lint --diff'' locally."

        exit 1

        '
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
    - name: yamllint
      uses: reviewdog/action-yamllint@8c429dfe4fc47b1ce1fa99a64e94693880d5dc30
      with:
        github_token: ${{ secrets.github_token }}
        filter_mode: added
        reporter: github-pr-review
        level: warning
        yamllint_flags: -d .github/workflows/config/yamllint_config.yml .
