name: FeG Lint & Test
'on':
  push:
    branches:
    - master
    - v1.*
  pull_request:
    branches:
    - master
    - v1.*
    types:
    - opened
    - reopened
    - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  path_filter:
    runs-on: ubuntu-latest
    outputs:
      should_not_skip: ${{ steps.changes.outputs.filesChanged }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
      if: github.event_name == 'push'
    - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50
      id: changes
      with:
        filters: "filesChanged:\n  - [\".github/workflows/feg-workflow.yml\", \"orc8r/**\"\
          , \"lte/**\", \"feg/**\"]\n"
    - name: Save should_not_skip output
      if: always()
      run: 'mkdir -p ./pr

        echo -n ${{ steps.changes.outputs.filesChanged == ''false'' }} > ./pr/skipped

        '
    - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      if: always()
      with:
        name: pr
        path: pr/
  feg-lint-precommit:
    needs: path_filter
    if: ${{ needs.path_filter.outputs.should_not_skip == 'true' }}
    name: feg lint and precommit
    runs-on: ubuntu-latest
    env:
      GO111MODULE: 'on'
      MAGMA_ROOT: ${{ github.workspace }}
    steps:
    - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - uses: actions/setup-go@c4a742cab115ed795e34d4513e2cf7d472deb55f
      with:
        go-version: 1.20.1
    - run: go version
    - name: Run golang_before_install.sh script
      run: ./.github/workflows/scripts/golang_before_install.sh
    - name: Run go mod download with retry
      uses: nick-fields/retry@3e91a01664abd3c5cd539100d10d33b9c5b68482
      if: always()
      id: feg-lint-init
      with:
        command: make -C ${MAGMA_ROOT}/feg/gateway download
        timeout_minutes: 10
    - name: Generate test coverage
      if: always() && steps.feg-lint.outcome=='success'
      id: feg-lint-cov
      run: 'make -C ${MAGMA_ROOT}/feg/gateway cover

        '
    - uses: codecov/codecov-action@d9f34f8cd5cb3b3eb79b3e4b5dae3a16df499a70
      if: always()
      id: feg-lint-codecov
      with:
        files: ${{ env.MAGMA_ROOT}}/feg/gateway/coverage/feg.gocov
        flags: feg-lint
    - name: Install gotestsum
      if: always()
      run: 'go install gotest.tools/gotestsum@v1.8.0

        '
    - name: Run precommit steps
      if: always()
      id: feg-precommit
      run: 'make -C ${MAGMA_ROOT}/feg/gateway precommit

        '
    - name: Upload Test Results
      id: feg-precommit-upload
      if: always()
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
      with:
        name: Unit Test Results
        path: /tmp/test-results
    - name: Lint radius src
      if: always()
      id: radius-src-lint
      working-directory: feg/radius/src
      run: './run.sh lint

        '
    - name: Run radius src unit tests
      if: always()
      id: radius-src-unit-tests
      working-directory: feg/radius/src
      run: './run.sh test

        '
    - name: Lint radius lib
      if: always()
      id: radius-lib-lint
      working-directory: feg/radius/lib/go/
      run: 'for dir in */; do (cd "$dir" && $MAGMA_ROOT/feg/radius/src/run.sh lint);
        done

        '
    - name: Run radius lib unit tests
      if: always()
      id: radius-lib-unit-tests
      working-directory: feg/radius/lib/go/
      run: 'for dir in */; do (cd "$dir" && $MAGMA_ROOT/feg/radius/src/run.sh test);
        done

        '
