name: PR Generate Unit Test Results
'on':
  workflow_run:
    workflows:
    - Orc8r Lint & Test
    - FeG Lint & Test
    - AGW Build & Test Experimental Go Code
    - NMS Lint & Test
    - DP Lint & Test
    types:
    - completed
jobs:
  skip_check:
    name: Job to retrieve the value in pr/skipped file
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
    - name: Download artifact
      uses: actions/github-script@d556feaca394842dc55e4734bf3bb9f685482fa0
      with:
        script: "var artifacts = await github.rest.actions.listWorkflowRunArtifacts({\n\
          \   owner: context.repo.owner,\n   repo: context.repo.repo,\n   run_id:\
          \ ${{github.event.workflow_run.id }},\n});\nvar matchArtifact = artifacts.data.artifacts.filter((artifact)\
          \ => {\n  return artifact.name == \"pr\"\n})[0];\nvar download = await github.rest.actions.downloadArtifact({\n\
          \   owner: context.repo.owner,\n   repo: context.repo.repo,\n   artifact_id:\
          \ matchArtifact.id,\n   archive_format: 'zip',\n});\nvar fs = require('fs');\n\
          fs.writeFileSync('${{github.workspace}}/pr.zip', Buffer.from(download.data));\n"
    - run: unzip pr.zip
    - name: Check if the workflow is skipped
      id: skip_check
      uses: actions/github-script@d556feaca394842dc55e4734bf3bb9f685482fa0
      with:
        script: "var fs = require('fs');\nvar skipFlag = fs.readFileSync('./skipped');\n\
          if( skipFlag == 'true' ) {\n  core.setOutput('should_skip', 'true');\n}\n\
          else  {\n  core.setOutput('should_skip', 'false');\n}\n"
  unit-test-results:
    name: Upload unit test for ${{ github.event.workflow.name }}
    needs: skip_check
    runs-on: ubuntu-latest
    if: "github.event.workflow_run.conclusion != 'skipped' &&\n  github.event.workflow_run.head_repository.full_name\
      \ != github.repository &&\n    needs.skip_check.outputs.should_skip == 'false'\n"
    steps:
    - name: Download and Extract Artifacts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "mkdir -p artifacts && cd artifacts\nartifacts_url=${{ github.event.workflow_run.artifacts_url\
        \ }}\ngh api \"$artifacts_url\" -q '.artifacts[] | [.name, .archive_download_url]\
        \ | @tsv' | while read artifact\ndo\n  IFS=$'\\t' read name url <<< \"$artifact\"\
        \n  gh api $url > \"$name.zip\"\n  unzip -d \"$name\" \"$name.zip\"\ndone\n"
    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@7377632048da85434c30810c38353542d3162dc4
      with:
        check_name: ${{ github.event.workflow.name }}
        commit: ${{ github.event.workflow_run.head_sha }}
        files: artifacts/**/*.xml
